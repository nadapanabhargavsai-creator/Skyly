<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Skyly | Weather App</title>

    <link rel="icon"
          href="assests/favicon.ico">

    <link rel="stylesheet"
          href="css/style.css">

    <link rel="stylesheet"
          href="css/responsive.css">

    <link rel="stylesheet"
          href="css/animations.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

</head>

<body class="clear-day">

<div id="background-overlay"></div>

<header>

    <div class="logo">

        <img src="assests/images/logo.png"
             alt="Skyly Logo">

        <h1>Skyly</h1>

    </div>

    <form id="search-form">

        <div class="search-container">

            <input
                    type="text"
                    id="search-input"
                    placeholder="Search any city..."
                    autocomplete="off">

            <div id="suggestions-list" class="suggestions-list hidden"></div>

        </div>

        <button type="submit">

            Search

        </button>

    </form>

</header>


<main>

<section class="current-weather card">

    <div class="city-section">

        <h2 id="city-name">

            Hyderabad

        </h2>

        <p id="current-date">

            Monday

        </p>

    </div>

    <div class="weather-main">

        <img
                id="weather-icon"
                src="assests/icons/clear.svg"
                alt="Weather Icon">

        <h1 id="temperature">

            30°C

        </h1>

    </div>

    <h3 id="condition">

        Clear Sky

    </h3>

    <div class="weather-details">

        <div class="clickable-card" data-topic="humidity">

            <span class="detail-label">💧 Humidity</span>

            <span id="humidity" class="detail-value">

                70%

            </span>

        </div>

        <div class="clickable-card" data-topic="wind">

            <span class="detail-label">🌬️ Wind Speed</span>

            <span id="wind-speed" class="detail-value">

                8 km/h

            </span>

        </div>

        <div class="clickable-card" data-topic="uv">

            <span class="detail-label">☀️ UV Index</span>

            <span id="uv-index" class="detail-value">

                --

            </span>

        </div>

        <div class="clickable-card" data-topic="sunrise">

            <span class="detail-label">🌅 Sunrise</span>

            <span id="sunrise" class="detail-value">

                --

            </span>

        </div>

        <div class="clickable-card" data-topic="sunset">

            <span class="detail-label">🌇 Sunset</span>

            <span id="sunset" class="detail-value">

                --

            </span>

        </div>

        <div class="clickable-card" data-topic="aqi">

            <span class="detail-label">🍃 Air Quality</span>

            <span id="aqi" class="detail-value">

                --

            </span>

        </div>

    </div>

</section>


<section class="controls">

    <button id="location-btn">

        📍 Use My Location

    </button>

    <button id="unit-toggle">

        °F

    </button>

</section>

<section class="astronomy card clickable-card" data-topic="astronomy">
    <h2 class="section-title">Moon Phase</h2>
    <div class="moon-phase-container">
        <div id="moon-visual">
            <img src="assests/images/moon.png" class="moon-realistic" alt="Moon Phase">
            <div class="moon-shadow"></div>
        </div>
        <h3 id="moon-phase-name">Waxing Crescent</h3>
    </div>
</section>

<section class="radar-map card clickable-card" data-topic="radar">
    <h2 class="section-title">Precipitation Radar</h2>
    <div id="weather-map"></div>
</section>


<section>

<h2 class="forecast-title">

    5-Day Forecast

</h2>

<div
        id="forecast-container"
        class="forecast-grid">

</div>

</section>


<div
        id="loading"
        class="loading hidden">

    <div class="spinner"></div>

    <p>

        Loading weather...

    </p>

</div>


<div
        id="error-message"
        class="error hidden">

</div>

</main>


<footer>

    <p>

        © 2026 Skyly • Powered by Open-Meteo API

    </p>

</footer>


<script
        type="module"
        src="js/helpers.js">
</script>

<script
        type="module"
        src="js/weather.js">
</script>

<script
        type="module"
        src="js/location.js">
</script>

<script
        type="module"
        src="js/search.js">
</script>

<script
        type="module"
        src="js/ui.js">
</script>

<script
        type="module"
        src="js/app.js">
</script>

</body>
</html>
