<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible"
          content="IE=edge">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Skyly | Weather App</title>

    <link rel="icon"
          href="assets/favicon.ico">

    <link rel="stylesheet"
          href="css/style.css">

    <link rel="stylesheet"
          href="css/responsive.css">

    <link rel="stylesheet"
          href="css/animations.css">

</head>

<body class="clear-day">

<div id="background-overlay"></div>

<header>

    <div class="logo">

        <img src="assets/images/logo.png"
             alt="Skyly Logo">

        <h1>Skyly</h1>

    </div>

    <form id="search-form">

        <input
                type="text"
                id="search-input"
                placeholder="Search any city..."
                autocomplete="off">

        <button type="submit">

            Search

        </button>

    </form>

</header>


<main>

<section class="current-weather card">

    <div class="city-section">

        <h2 id="city-name">

            Hyderabad

        </h2>

        <p id="current-date">

            Monday

        </p>

    </div>

    <div class="weather-main">

        <img
                id="weather-icon"
                src="assets/icons/clear.svg"
                alt="Weather Icon">

        <h1 id="temperature">

            30°C

        </h1>

    </div>

    <h3 id="condition">

        Clear Sky

    </h3>

    <div class="weather-details">

        <div>

            💧

            <span id="humidity">

                70%

            </span>

        </div>

        <div>

            🌬️

            <span id="wind-speed">

                8 km/h

            </span>

        </div>

    </div>

</section>


<section class="controls">

    <button id="location-btn">

        📍 Use My Location

    </button>

    <button id="unit-toggle">

        °F

    </button>

</section>


<section>

<h2 class="forecast-title">

    5-Day Forecast

</h2>

<div
        id="forecast-container"
        class="forecast-grid">

</div>

</section>


<div
        id="loading"
        class="loading hidden">

    <div class="spinner"></div>

    <p>

        Loading weather...

    </p>

</div>


<div
        id="error-message"
        class="error hidden">

</div>

</main>


<footer>

    <p>

        © 2026 Skyly • Powered by Open-Meteo API

    </p>

</footer>


<script
        type="module"
        src="js/helpers.js">
</script>

<script
        type="module"
        src="js/weather.js">
</script>

<script
        type="module"
        src="js/location.js">
</script>

<script
        type="module"
        src="js/search.js">
</script>

<script
        type="module"
        src="js/ui.js">
</script>

<script
        type="module"
        src="js/app.js">
</script>

</body>

</html>
